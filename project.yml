name: SwiftMaestro
targetBundleIdentifierPrefix: com.woodseedigi.swiftmaestro
options:
  bundleIdPrefix: com.woodseedigi
  deploymentTarget: macOS 14.0
  xcodeVersion: "16"

packages:
  mlx-swift-lm:
    path: ../mlx-swift-lm
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    majorVersion: 1.3.0
  mcp-swift-sdk:
    path: ../mcp-swift-sdk
  whisperkit:
    path: ../WhisperKit

groups:
  - Sources
  - Resources
  - Tests

fileGroups: []

configurations:
  Debug: debug
  Release: release

settings:
  base:
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    ARCHS: arm64

targets:
  SwiftMaestro:
    type: application
    platform: macOS
    sources:
      - path: Sources
        exclude:
          - "**/.gitignore"
      - path: Sources/App
      - path: Sources/Views
      - path: Sources/ViewModels
      - path: Sources/Adapters
      - path: Sources/Services
      - path: Sources/Models
      - path: Sources/Memory
      - path: Sources/Engine
    settings:
      base:
        DEFINES_MODULE: YES
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_BUNDLE_IDENTIFIER: com.woodseedigi.swiftmaestro
        SWIFT_VERSION: 6.3
        MACOSX_DEPLOYMENT_TARGET: 14.0
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/SwiftMaestro.entitlements
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: "3BMZ2ULZ54"
          # Do NOT inject the debug base entitlements (get-task-allow); Apple
          # notarization rejects any executable that requests it.
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp --options runtime"
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-transformers
        product: Tokenizers
      - package: swift-transformers
        product: Hub
      - package: mcp-swift-sdk
        product: MCP
      - package: whisperkit
        product: WhisperKit
    scheme:
      testTargets:
        - SwiftMaestroTests

  SwiftMaestroTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Sources/Services/SecretsStore.swift
      - path: Sources/Services/KeychainService.swift
    settings:
      SWIFT_VERSION: 6.3
      MACOSX_DEPLOYMENT_TARGET: 14.0
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.woodseedigi.swiftmaestrotests
      CODE_SIGN_IDENTITY: "-"

defaultLanguage: Swift
platforms: []
