name: SwiftMaestro
targetBundleIdentifierPrefix: com.woodseedigi.swiftmaestro
options:
  bundleIdPrefix: com.woodseedigi
  deploymentTarget: macOS 14.0
  xcodeVersion: "16"

packages:
  mlx-swift-lm:
    path: ../mlx-swift-lm
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    majorVersion: 1.3.0

groups:
  - Sources
  - Resources
  - Tests

fileGroups: []

settingsBaseName: Release

configurations:
  Debug: debug
  Release: release

settings:
  BASE_SETTINGS:
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"

targets:
  SwiftMaestro:
    type: application
    platform: macOS
    sources:
      - path: Sources
        exclude:
          - "**/.gitignore"
      - path: Sources/App
      - path: Sources/Views
      - path: Sources/ViewModels
      - path: Sources/Adapters
      - path: Sources/Services
      - path: Sources/Models
      - path: Sources/Memory
      - path: Sources/Engine
    settings:
      DEFINES_MODULE: YES
      PRODUCT_NAME: "$(TARGET_NAME)"
      PRODUCT_BUNDLE_IDENTIFIER: com.woodseedigi.swiftmaestro
      SWIFT_VERSION: 6.3
      MACOSX_DEPLOYMENT_TARGET: 14.0
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "-"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      INFOPLIST_FILE: Sources/Resources/Info.plist
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-transformers
        product: Tokenizers
      - package: swift-transformers
        product: Hub
    scheme:
      testTargets:
        - SwiftMaestroTests

  SwiftMaestroTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Sources/Services/SecretsStore.swift
      - path: Sources/Services/KeychainService.swift
    settings:
      SWIFT_VERSION: 6.3
      MACOSX_DEPLOYMENT_TARGET: 14.0
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.woodseedigi.swiftmaestrotests
      CODE_SIGN_IDENTITY: "-"

defaultLanguage: Swift
platforms: []
