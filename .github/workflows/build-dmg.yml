name: Build DMG

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout SwiftMaestro
        uses: actions/checkout@v4
        with:
          path: SwiftMaestro
      
      - name: Clone dependencies
        run: |
          git clone --depth 1 https://github.com/ml-explore/mlx-swift-lm.git mlx-swift-lm
          git clone --depth 1 https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/WOODSEE-DIGI/mcp-swift-sdk.git mcp-swift-sdk
          git clone --depth 1 https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/WOODSEE-DIGI/WhisperKit.git WhisperKit
      
      - name: Install xcodegen
        run: brew install xcodegen
      
      - name: Generate Xcode project
        run: xcodegen generate
        working-directory: SwiftMaestro
      
      - name: Build Release
        run: |
          xcodebuild -project SwiftMaestro.xcodeproj \
            -scheme SwiftMaestro \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_HARDENED_RUNTIME=NO \
            build
        working-directory: SwiftMaestro
      
      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R SwiftMaestro/build/Release/SwiftMaestro.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "SwiftMaestro" -srcfolder dmg-staging -ov -format UDZO SwiftMaestro.dmg
          rm -rf dmg-staging
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: SwiftMaestro-${{ steps.version.outputs.version }}
          path: SwiftMaestro.dmg
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SwiftMaestro.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
